<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=yes">
        <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/github-light.css">
    <link rel="icon" type="image/svg+xml" href="/static/icons/github-mark.svg">
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 920px;
            margin: 0 auto;
            padding: 45px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
            }
            .markdown-body {
                color-scheme: dark;
                color: #e6edf3;
                background-color: #0d1117;
            }
            .markdown-body a {
                color: #58a6ff;
            }
            .markdown-body a:visited {
                color: #bc8cff;
            }
            .markdown-body hr,
            .markdown-body pre,
            .markdown-body blockquote {
                border-color: #30363d;
            }
            .markdown-body blockquote {
                color: #8b949e;
            }
            .markdown-body pre,
            .markdown-body code {
                background-color: #161b22;
                color: #e6edf3;
            }
            .markdown-body h1,
            .markdown-body h2 {
                border-bottom-color: #21262d;
            }
            .markdown-body table tr {
                background-color: #0d1117;
                border-top-color: #21262d;
            }
            .markdown-body table tr:nth-child(2n) {
                background-color: #161b22;
            }
            .markdown-body table td,
            .markdown-body table th {
                border-color: #30363d;
            }
            .markdown-body img {
                background-color: transparent;
            }
        }
    </style>
    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)'],
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]'],
                ],
            }
        }
    </script>
</head>

<body>
    <article class="markdown-body {{theme}}">
        {{ content }}
    </article>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4.0.0/tex-mml-chtml.js"></script>
    <!-- TODO: currently mathjax is used from cdn but I wanna emebeded mathjax.js into index.html. -->
    <script type="text/javascript" src="/static/js/mermaid/mermaid.min.js"></script>
    <script type="text/javascript" src="/static/js/main.js"></script>
</body>

</html>
