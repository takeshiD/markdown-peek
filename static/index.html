<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=yes">
        <title>{{ title }}</title>
    <link id="mdpeek-theme-light" rel="stylesheet" href="/static/css/github-light.css">
    <link id="mdpeek-theme-dark" rel="stylesheet" href="/static/css/github-dark.css" disabled>
    <link id="mdpeek-hljs-light" rel="stylesheet" href="/static/js/highlight/github.min.css">
    <link id="mdpeek-hljs-dark" rel="stylesheet" href="/static/js/highlight/github-dark.min.css" disabled>
    <link rel="icon" type="image/svg+xml" href="/static/icons/github-mark.svg">
    <style>
        /* Unify the whole UI (TOC, file sidebar, toolbar, front-matter panel)
           onto the main content font. Those chrome elements live outside
           `.markdown-body`, so without this they fall back to the browser's
           default (serif) font. Keep this stack identical to `.markdown-body`
           in github-{light,dark}.css. */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", YuGothic, Meiryo, "Noto Sans CJK JP", "Noto Sans JP", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }
        /* Form controls (e.g. the TOC search box) don't inherit font by
           default — make them match too. */
        input, button, select, textarea {
            font-family: inherit;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 920px;
            margin: 0 auto;
            padding: 45px;
        }
    </style>
    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)'],
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]'],
                ],
            }
        }
    </script>
</head>

<body>
    <button id="mdpeek-sidebar-toggle" type="button" aria-label="Toggle file explorer" aria-pressed="false" title="Toggle files" hidden><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-left"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg></button>
    <div id="mdpeek-toolbar">
        <button id="mdpeek-theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle theme"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
        <button id="mdpeek-autoscroll-toggle" type="button" aria-label="Toggle auto-scroll to changes" aria-pressed="false" title="Auto-scroll to changes"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-locate-fixed"><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button id="mdpeek-toc-toggle" type="button" aria-label="Toggle table of contents" aria-pressed="false" title="Toggle contents" hidden><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg></button>
    </div>
    <article class="markdown-body {{theme}}">
        {{ content }}
    </article>
    <!-- Raw front matter (YAML/+++) for the viewer's front matter panel; empty when absent. -->
    {{ frontmatter }}
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4.0.0/tex-mml-chtml.js"></script>
    <!-- TODO: currently mathjax is used from cdn but I wanna emebeded mathjax.js into index.html. -->
    <script type="text/javascript" src="/static/js/mermaid/mermaid.min.js"></script>
    <script type="text/javascript" src="/static/js/highlight/highlight.min.js"></script>
    <script type="text/javascript" src="/static/js/main.js"></script>
</body>

</html>
